    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGamix - Crear Jugador</title>
    <link rel="stylesheet" href="principal.css">
</head>

<body>
    <!-- Encabezado -->
    <header>
        <div class="logo">
            <img src="\img\logo.png" alt="EduGamix Logo" height="60">
        </div>
        <h1>Crear Cuenta de Jugador</h1>
        <div class="auth-buttons">
            <button class="login-btn sign-in-btn">Unirse al Juego</button>
        </div>
    </header>
    <div class="container">
        <!-- Formulario de Registro -->
         <form class="registration-form">
            <label for="username">Alias</label>
            <input type="text" id="username" name="username" required>
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" required>
            <label for="password">Contraseña</label> 
            <input type="password" id="password" name="password" required> 
            <label for="confirm-password">Confirmar Contraseña</label> 
            <input type="password" id="confirm-password" name="confirm-password" required> 
            <button type="submit" class="register-btn">Crear</button> </form>

    </div>    

    <script>
        // Alternar entre formularios
        document.getElementById('go-to-login').addEventListener('click', function() {
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        });

        document.getElementById('go-to-register').addEventListener('click', function() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
        });
    </script>
</body>

</html>
